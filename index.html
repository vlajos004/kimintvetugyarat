<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Icengo Kalkulátor</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🍦 Icengo Kalkulátor</h1>

    <div class="card">
        <h2>Tegnap esti összsúly (g)</h2>

        <input
            id="yesterdayTotal"
            type="number"
            placeholder="Pl. 18470">
    </div>

  <!--     <div class="card">

   <!--     <h2>Korrekció</h2>

        <div class="toggleButtons">

            <div id="receivedBtn" class="toggle active">
                📤 Pluszom maradt.
            </div>

            <div id="takenBtn" class="toggle">
                📥 Minuszom van, pótolni kell.
            </div>
-->
        </div>

        <input
            id="extra"
            type="number"
            placeholder="Gramm">

    </div>

    <div class="card">

        <h2>Felbontott 2,4 kg-os zsákok</h2>

        <input
            id="bags"
            type="number"
            min="0"
            placeholder="Darab">

    </div>

    <div class="card">

        <h2>Mai eladások, plusz Zolihoz beírt saját fogyasztások!</h2>

        <label>
            L (60 g)
            <input id="l" type="number">
        </label>

        <label>
            XL (80 g)
            <input id="xl" type="number">
        </label>

        <label>
            XXL (100 g)
            <input id="xxl" type="number">
        </label>

        <label>
            Családi (240 g)
            <input id="cs" type="number">
        </label>

    </div>

    <div class="card">

        <h2>Jelenlegi mérések (g)</h2>

        <div id="flavors"></div>

    </div>

    <button id="calc">
        SZÁMÍTÁS KEZDÉSE
    </button>

    <div class="card hidden" id="result">

        <h2>Eredmény</h2>

        <p>
            Elvárt fogyás
            <b id="expected"></b>
        </p>

        <p>
            Valós fogyás
            <b id="actual"></b>
        </p>

        <p>
            Eltérés
            <b id="diff"></b>
        </p>

        <p>
            Átlag
            <b id="avg"></b>
        </p>
<!--
        <!-- EZ ÚJ -->

        <hr>

        <p id="remainingL" class="remaining"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
