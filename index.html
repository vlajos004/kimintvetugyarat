<!DOCTYPE html><html lang="hu"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Icengo Kalkulátor</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head><body>
<div class="container">
<h1>🍦 Icengo Kalkulátor</h1>

<div class="card">
<h2>Tegnap esti összsúly (g)</h2>
<input id="yesterdayTotal" type="number" placeholder="Pl. 28470">
</div>

<div class="card">

    <h2>Korrekció</h2>

    <label>
        <input type="radio" name="extraType" value="received" checked>
        Kaptam jégkrémet
    </label>

    <label>
        <input type="radio" name="extraType" value="taken">
        Elvittek jégkrémet
    </label>

    <input
        id="extra"
        type="number"
        value="0"
        placeholder="Gramm">

</div>

<div class="card">
<h2>Mai eladások</h2>
<label>L (60 g)<input id="l" type="number" value="0"></label>
<label>XL (80 g)<input id="xl" type="number" value="0"></label>
<label>XXL (100 g)<input id="xxl" type="number" value="0"></label>
<label>Családi (240 g)<input id="cs" type="number" value="0"></label>
</div>

<div class="card">
<h2>Jelenlegi mérések (g)</h2>
<div id="flavors"></div>
</div>

<button id="calc">SZÁMÍTÁS KEZDÉSE</button>

<div class="card hidden" id="result">
<h2>Eredmény</h2>
<p>Elvárt fogyás <b id="expected"></b></p>
<p>Valós fogyás <b id="actual"></b></p>
<p>Eltérés <b id="diff"></b></p>
<p>Átlag <b id="avg"></b></p>
</div>

<script src="script.js"></script>
</body></html>
